<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 35px;
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .glass-card h2 {
            margin-bottom: 20px;
        }

        .glass-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .glass-card button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 25px;
            border: none;
            background: white;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .glass-card button:hover {
            transform: scale(1.05);
            background: #f1f1f1;
        }

        .error {
            background: #ff4d4d;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .success {
            background: #00ff99;
            color: black;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .back-link {
            margin-top: 15px;
            display: block;
            color: white;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="glass-card">
    <h2>Create Account</h2>

    <!-- 🔴 Error Message -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <!-- 🟢 Success Message -->
    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <a href="/login" class="back-link">← Go to Login</a>
</div>

</body>
</html>
